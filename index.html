<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Image Search API | JSON Demo</title>
<meta name="description" content="Free Image Search REST API with Chrome scraping. Try live demo and see raw JSON output instantly." />
<meta name="robots" content="index, follow" />

<style>
:root{
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --primary:#58a6ff;
  --text:#c9d1d9;
  --muted:#8b949e;
}

body{
  margin:0;
  font-family:Consolas, monospace;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:2.2rem;
  margin-bottom:10px;
  color:white;
}

h2{
  margin-top:40px;
  color:var(--primary);
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:20px;
}

input{
  padding:10px;
  width:60%;
  background:#0d1117;
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
}

button{
  padding:10px 18px;
  margin-left:10px;
  background:var(--primary);
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

pre{
  margin-top:20px;
  background:#010409;
  padding:20px;
  border-radius:8px;
  overflow:auto;
  font-size:14px;
  line-height:1.5;
  border:1px solid var(--border);
}

.footer{
  margin-top:60px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}
</style>
</head>

<body>
<div class="container">

<h1>Image Search API</h1>
<p>Simple REST API returning JSON responses.</p>

<div class="card">
<h2>Base URL</h2>
<code>https://image-scraper-api-with-chrome.onrender.com</code>

<h2>Endpoints</h2>
<ul>
<li>GET /search?q=cat&count=5</li>
<li>GET /health</li>
</ul>
</div>

<div class="card">
<h2>Live JSON Demo</h2>

<input type="text" id="query" placeholder="Enter search term..." />
<button onclick="searchAPI()">Send Request</button>

<pre id="output">JSON response will appear here...</pre>
</div>

<div class="footer">
Free Image Search API • 2026
</div>

</div>

<script>
async function searchAPI(){
    const query = document.getElementById("query").value.trim();
    const output = document.getElementById("output");

    if(!query){
        alert("Enter a search term");
        return;
    }

    output.textContent = "Loading...";

    try{
        const response = await fetch(
            `https://image-scraper-api-with-chrome.onrender.com/search?q=${encodeURIComponent(query)}&count=5`
        );

        const data = await response.json();

        // Show RAW JSON only
        output.textContent = JSON.stringify(data, null, 2);

    }catch(error){
        output.textContent = "Error fetching API:\n\n" + error;
    }
}
</script>

</body>
</html>
